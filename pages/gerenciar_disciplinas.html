<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Disciplinas - SCA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/disciplinaStyle.css">
</head>
<header class="bg-dark py-1 cabecalho-customizado">
            <div class="d-flex justify-content-center align-items-center text-center my-2">
                <div>
                    <img class="logo-customizado img-fluid rounded-circle mb-4 me-3" src="/assets/logo/logo_sca.png" alt="Logomarca da SCA"/>
                </div>
                <div>
                    <h1 class="text-white fs-3 fw-bolder">Sistema de Controle Acadêmico</h1>
                    <p class="text-white-50">Seja Bem Vindo!</p>
                </div>
            </div>
        </header>
<body>

<nav class="navbar navbar-expand-lg navbar-azul">
    <div class="container">
        <a class="navbar-brand" href="../index.html">SCA</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header cabecalho-horario text-white">
            <h3>Gerenciamento de Disciplinas</h3>
        </div>

        <div class="card-body">
            <form id="formDisciplina">

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Nome da Disciplina</label>
            <input type="text" class="form-control" id="nomeDisciplina">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Código da Disciplina</label>
            <input type="text" class="form-control" id="codigo">
        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Carga Horária (horas)</label>
            <input type="number" class="form-control" id="cargaHoraria">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Professor Responsável</label>
            <input type="text" class="form-control" id="professor">
        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Período</label>
            <select class="form-select" id="periodo">
                <option value="">Selecione</option>
                <option>1º Termo</option>
                <option>2º Termo</option>
                <option>3º Termo</option>
                <option>4º Termo</option>
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" id="status">
                <option value="">Selecione</option>
                <option>Ativa</option>
                <option>Inativa</option>
            </select>
        </div>

    </div>

    <button type="submit" class="btn btn-azul">
        Salvar Disciplina
    </button>

</form>

<div id="mensagem" class="mt-3"></div>

    </div>
</div>

</div>
<script src="../js/disciplinaScript.js"></script>

</body>
</html>
