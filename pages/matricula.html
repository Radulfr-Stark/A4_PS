<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle Acadêmico</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">

</head>


<body class="d-flex flex-column min-vh-100">



    <div class="container my-5 flex-grow-1">


        <div class="row justify-content-center">
            <!-- SECTION DE TITULOS E CONSULTAS -->
            <section>
                <h3>Gerenciar Matriculas</h3>


                <div class="d-flex gap-3">
                    <button class="btn btn-success" type="submit">Consultar</button>
                    <button class="btn btn-primary" type="submit">Nova Matricula</button>
                </div>
            </section>

            <!-- SECTION DE TABLE -->
            <section class="my-3">
                <table class="table border table-striped table-hover align-middle">
                    <thead>
                        <tr>
                            <th scope="col" style="width: 5%;">#</th>
                            <th scope="col" style="width: 10%;">RM</th>
                            <th scope="col">Nome</th>
                            <th scope="col" style="width: 15%;">Status</th>
                            <th scope="col" class="text-end" style="width: 20%;">Funcionalidades</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th scope="row">1</th>
                            <td>01</td>
                            <td>Beltrano Freitas</td>
                            <td><span class="badge bg-success">ATIVO</span></td>
                            <td>
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-sm btn-outline-info" title="Informações">
                                        <i class="bi bi-info-circle"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Apagar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row">2</th>
                            <td>02</td>
                            <td>Ciclano Sales</td>
                            <td><span class="badge bg-success">ATIVO</span></td>
                            <td>
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-sm btn-outline-info" title="Informações">
                                        <i class="bi bi-info-circle"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Apagar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row">3</th>
                            <td>03</td>
                            <td>Fulano Silva</td>
                            <td><span class="badge bg-success">ATIVO</span></td>
                            <td>
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-sm btn-outline-info" title="Informações">
                                        <i class="bi bi-info-circle"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Apagar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>


        </div>
    </div>

</body>

</html>
