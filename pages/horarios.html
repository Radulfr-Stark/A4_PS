<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Horários - SCA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/horariosStyle.css">
</head>
<header class="bg-dark py-1 cabecalho-customizado">
            <div class="d-flex justify-content-center align-items-center text-center my-2">
                <div>
                    <img class="logo-customizado img-fluid rounded-circle mb-4 me-3" src="/assets/logo/logo_sca.png" alt="Logomarca da SCA"/>
                </div>
                <div>
                    <h1 class="text-white fs-3 fw-bolder">Sistema de Controle Acadêmico</h1>
                    <p class="text-white-50">Seja Bem Vindo!</p>
                </div>
            </div>
        </header>
<body>

<nav class="navbar navbar-expand-lg navbar-azul">
    <div class="container">
        <a class="navbar-brand" href="../index.html">SCA</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header cabecalho-horario text-white">
            <h3>Gerenciamento de Horários</h3>
        </div>

        <div class="card-body">

            <form id="formHorario">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Turma</label>
                        <select class="form-select" id="turma">
                            <option value="">Selecione</option>
                            <option>Análise e Desenvolvimento de Sistemas</option>
                            <option>Engenharia de Software</option>
                            <option>Ciência da Computação</option>
                            <option>Sistemas de Informação</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Disciplina</label>
                        <select class="form-select" id="disciplina">
                            <option value="">Selecione</option>
                            <option>Lógica</option>
                            <option>Processos de Software</option>
                            <option>Desenvolvimento Front-end</option>
                            <option>Matemática aplicada</option>
                            <option>Estatística</option>
                            <option>Organização e recuperação da informação</option>
                            <option>Banco de Dados</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Professor</label>
                        <input type="text" class="form-control" id="professor">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Dia da Semana</label>
                        <select class="form-select" id="dia">
                            <option value="">Selecione</option>
                            <option>Segunda-feira</option>
                            <option>Terça-feira</option>
                            <option>Quarta-feira</option>
                            <option>Quinta-feira</option>
                            <option>Sexta-feira</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Horário Inicial</label>
                        <input type="time" class="form-control" id="inicio">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Horário Final</label>
                        <input type="time" class="form-control" id="fim">
                    </div>

                </div>

                <button type="submit" class="btn btn-azul">
                    Salvar Horário
                </button>

            </form>

            <div id="mensagem" class="mt-3"></div>

        </div>
    </div>

</div>

<script src="../js/horariosScript.js"></script>

</body>
</html>
