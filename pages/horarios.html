<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SCA - Gerenciar Horários</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <!-- CSS Customizado -->
        <link rel="stylesheet" href="../css/horariosStyle.css">
    </head>

    <body class="bg-light d-flex flex-column min-vh-100">
        <!-- Responsive navbar-->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand">SCA - Seleção de Módulo</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 text-end">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="acesso_rapido.html">Seleção de Módulo</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contatos">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Header - Responsivo -->
        <header class="bg-dark py-4 mb-3">
            <div class="container">
                <div class="d-flex flex-column flex-md-row align-items-center justify-content-center text-center">
                    <img src="../assets/logo/logo_sca.png" alt="Logomarca da SCA" class="img-fluid rounded-circle mb-3 mb-md-0 me-md-4" style="max-width: 120px;">
                    <div>
                        <h1 class="text-white fw-bold mb-2">Sistema de Controle Acadêmico</h1>
                        <p class="lead text-white-50 small mb-0">Selecione o Módulo de Operação</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow-1">
            <div class="container mt-5">
                <div class="card shadow">
                    <div class="card-header cabecalho-horario text-white">
                        <h3>Gerenciamento de Horários</h3>
                    </div>
                    <div class="card-body">
                        <form id="formHorario">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Turma</label>
                                    <select class="form-select" id="turma">
                                        <option value="">Selecione</option>
                                        <option>Análise e Desenvolvimento de Sistemas</option>
                                        <option>Engenharia de Software</option>
                                        <option>Ciência da Computação</option>
                                        <option>Sistemas de Informação</option>
                                    </select>
                                </div>
    
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Disciplina</label>
                                    <select class="form-select" id="disciplina">
                                        <option value="">Selecione</option>
                                        <option>Lógica</option>
                                        <option>Processos de Software</option>
                                        <option>Desenvolvimento Front-end</option>
                                        <option>Matemática aplicada</option>
                                        <option>Estatística</option>
                                        <option>Organização e recuperação da informação</option>
                                        <option>Banco de Dados</option>
                                    </select>
                                </div>
                            </div>
    
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Professor</label>
                                    <input type="text" class="form-control" id="professor">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Dia da Semana</label>
                                    <select class="form-select" id="dia">
                                        <option value="">Selecione</option>
                                        <option>Segunda-feira</option>
                                        <option>Terça-feira</option>
                                        <option>Quarta-feira</option>
                                        <option>Quinta-feira</option>
                                        <option>Sexta-feira</option>
                                    </select>
                                </div>
                            </div>
    
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Horário Inicial</label>
                                    <input type="time" class="form-control" id="inicio">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Horário Final</label>
                                    <input type="time" class="form-control" id="fim">
                                </div>

                            </div>
    
                            <button type="submit" class="btn btn-azul">
                                Salvar Horário
                            </button>
                        </form>
                        <div id="mensagem" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Rodape -->
        <footer class="py-5 bg-dark mt-auto">
            <div id="contatos">
                <div class="container my-1">
                    <p class="m-0 text-center text-white">&copy; Copyright SCA 2026</p>
                </div>
                <div class="container text-center text-white my-1">
                    <i class="bi bi-telephone me-1"></i>
                    (99) 99999-9999
                </div>
                <div class="container text-center text-white my-1">
                    <i class="bi bi-envelope-at-fill me-2"></i>support@email.com
                </div>
            </div>
        </footer>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../js/horariosScript.js"></script>
    </body>
</html>
